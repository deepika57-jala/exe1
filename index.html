<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern 1 - 3x3 Grid</title>
    <style>
        .grid-container {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(5, 1fr);
            width: 300px;
            height: 300px;
            gap: 5px;
            padding: 20px;
            background-color: #f0f0f0;
            border: 2px solid #333;
        }
        .grid-item {
            border: 2px solid #333;
        }
        .orange {
            background-color: orange; /* Light orange/yellowish */
        }
        .brown {
            background-color: brown; /* Brown/orange */
        }
        .sandle{
             background-color: sandybrown; 
        }
    </style>
</head>
<body>
    <h1>Lab Exercise 1: Create the Following Patterns using HTML & CSS</h1>
    <div class="grid-container">
        <div class="grid-item orange"></div>
        <div class="grid-item sandle"></div>
        <div class="grid-item brown"></div>
        <div class="grid-item orange"></div>
        <div class="grid-item sandle"></div>
        <div class="grid-item brown"></div>
        <div class="grid-item sandle"></div>
        <div class="grid-item brown"></div>
        <div class="grid-item orange"></div>
         <div class="grid-item sandle"></div>
        <div class="grid-item brown"></div>
        <div class="grid-item orange"></div>
        <div class="grid-item brown"></div>
        <div class="grid-item orange"></div>
        <div class="grid-item sandle"></div>
        <div class="grid-item brown"></div>
        <div class="grid-item orange"></div>
        <div class="grid-item sandle"></div>
         <div class="grid-item orange"></div>
        <div class="grid-item sandle"></div>
        <div class="grid-item brown"></div>
        <div class="grid-item orange"></div>
        <div class="grid-item sandle"></div>
        <div class="grid-item brown"></div>
        <div class="grid-item sandle"></div>
        <div class="grid-item brown"></div>
        <div class="grid-item orange"></div>
        <div class="grid-item sandle"></div>
        <div class="grid-item brown"></div>
        <div class="grid-item orange"></div>
    </div>
</body>
</html>
